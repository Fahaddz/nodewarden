name: AI PR Review

on: # zizmor: ignore[dangerous-triggers] privileged job uses protected main, validates repo/branch/SHA, and never executes PR code
  workflow_run:
    workflows:
      - Extra Security Scan
    types:
      - completed
  workflow_dispatch:
    inputs:
      pr_number:
        description: PR number to review manually
        required: true

permissions:
  contents: read
  actions: read
  pull-requests: write
  issues: write

concurrency:
  group: ai-pr-review-${{ github.event.workflow_run.head_sha || github.event.inputs.pr_number || github.run_id }}
  cancel-in-progress: true

jobs:
  review:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
          ref: main
          persist-credentials: false

      - name: Resolve PR context
        id: context
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EVENT_NAME: ${{ github.event_name }}
          EVENT_PATH: ${{ github.event_path }}
          INPUT_PR_NUMBER: ${{ github.event.inputs.pr_number || '' }}
        run: |
          set -euo pipefail

          if [ "$EVENT_NAME" = "workflow_run" ]; then
            PR_NUMBER="$(jq -r '.workflow_run.pull_requests[0].number // empty' "$EVENT_PATH")"
            HEAD_BRANCH="$(jq -r '.workflow_run.head_branch // empty' "$EVENT_PATH")"
            SECURITY_HEAD_SHA="$(jq -r '.workflow_run.head_sha // empty' "$EVENT_PATH")"
            SECURITY_RUN_ID="$(jq -r '.workflow_run.id' "$EVENT_PATH")"
            SECURITY_CONCLUSION="$(jq -r '.workflow_run.conclusion // "unknown"' "$EVENT_PATH")"
            SECURITY_URL="$(jq -r '.workflow_run.html_url // empty' "$EVENT_PATH")"
            SECURITY_NAME="$(jq -r '.workflow_run.name // "Security Scan"' "$EVENT_PATH")"
            if [ -z "$PR_NUMBER" ] || [[ "$HEAD_BRANCH" != upstream-sync/* ]]; then
              echo "skip=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          else
            PR_NUMBER="$INPUT_PR_NUMBER"
            SECURITY_HEAD_SHA=""
            SECURITY_RUN_ID=""
            SECURITY_CONCLUSION="manual"
            SECURITY_URL=""
            SECURITY_NAME="manual"
          fi

          gh api "repos/${{ github.repository }}/pulls/$PR_NUMBER" > pr-api.json
          gh pr view "$PR_NUMBER" --json number,title,body,headRefName,baseRefName,url,changedFiles,commits,author,mergeable,state > pr.json

          PR_HEAD="$(jq -r '.head.ref' pr-api.json)"
          PR_HEAD_SHA="$(jq -r '.head.sha' pr-api.json)"
          PR_HEAD_REPO="$(jq -r '.head.repo.full_name' pr-api.json)"
          PR_BASE="$(jq -r '.base.ref' pr-api.json)"
          PR_STATE="$(jq -r '.state' pr-api.json)"
          if [[ "$PR_HEAD" != upstream-sync/* ]] || \
             [ "$PR_BASE" != "main" ] || \
             [ "$PR_HEAD_REPO" != "${{ github.repository }}" ] || \
             [ "$PR_STATE" != "open" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ -n "$SECURITY_HEAD_SHA" ] && [ "$SECURITY_HEAD_SHA" != "$PR_HEAD_SHA" ]; then
            echo "Security result is stale for the current PR head; skipping review."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ -n "$SECURITY_RUN_ID" ]; then
            gh api "repos/${{ github.repository }}/actions/runs/$SECURITY_RUN_ID/jobs?per_page=100" > security-jobs.json
          else
            printf '{"jobs":[]}\n' > security-jobs.json
          fi

          jq -n \
            --arg conclusion "$SECURITY_CONCLUSION" \
            --arg url "$SECURITY_URL" \
            --arg name "$SECURITY_NAME" \
            --argjson jobs "$(cat security-jobs.json)" \
            '{
              workflowName: $name,
              conclusion: $conclusion,
              url: $url,
              jobs: ($jobs.jobs // [])
            }' > security.json

          gh pr diff "$PR_NUMBER" --patch > pr.diff

          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"

      - name: Generate AI review
        if: steps.context.outputs.skip != 'true'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: gemini-flash-latest
          PR_METADATA_PATH: pr.json
          SECURITY_METADATA_PATH: security.json
          DIFF_PATH: pr.diff
          OUTPUT_PATH: ai-review.md
          MAX_DIFF_CHARS: "240000"
          GEMINI_MAX_ATTEMPTS: "5"
        run: |
          node .github/scripts/ai-pr-review.cjs

      - name: Create or update PR comment
        if: steps.context.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.context.outputs.pr_number }}
        run: |
          set -euo pipefail

          MARKER="<!-- ai-upstream-review -->"
          jq -Rs --arg marker "$MARKER"$'\n' '{body: ($marker + .)}' ai-review.md > comment.json

          COMMENT_ID="$(gh api "repos/${{ github.repository }}/issues/$PR_NUMBER/comments" --paginate | jq -r '.[] | select(.user.login == "github-actions[bot]" and (.body | contains("<!-- ai-upstream-review -->"))) | .id' | tail -n 1)"

          if [ -n "$COMMENT_ID" ]; then
            gh api "repos/${{ github.repository }}/issues/comments/$COMMENT_ID" --method PATCH --input comment.json > /dev/null
          else
            gh api "repos/${{ github.repository }}/issues/$PR_NUMBER/comments" --method POST --input comment.json > /dev/null
          fi
