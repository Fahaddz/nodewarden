name: Upstream Review PR

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:
    inputs:
      upstream_branch:
        description: Upstream branch to sync from
        required: true
        default: main

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: upstream-review-pr
  cancel-in-progress: true

jobs:
  sync-and-open-pr:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: main

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Fetch upstream
        env:
          UPSTREAM_BRANCH: ${{ github.event.inputs.upstream_branch || 'main' }}
        run: |
          git remote add upstream https://github.com/shuaiplus/NodeWarden.git || true
          git fetch upstream "$UPSTREAM_BRANCH"

      - name: Merge upstream into review branch
        env:
          UPSTREAM_BRANCH: ${{ github.event.inputs.upstream_branch || 'main' }}
        run: |
          git checkout -B upstream-review origin/main
          git merge --no-ff --no-edit "upstream/$UPSTREAM_BRANCH"

      - name: Push review branch
        run: |
          git push --force-with-lease origin upstream-review

      - name: Create or update PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $body = @"
          Scheduled upstream sync for review.

          Checklist before merge:
          - Review `.github/workflows/` changes carefully
          - Review auth, backup, crypto, and deployment changes
          - Wait for CI/security checks to complete
          - Ask Codex to review `upstream-review` against `main`
          "@

          $existing = gh pr list --head upstream-review --base main --state open --json number --jq ".[0].number"
          if ($existing) {
            gh pr edit $existing --title "Review upstream NodeWarden updates" --body $body
          } else {
            gh pr create --base main --head upstream-review --title "Review upstream NodeWarden updates" --body $body
          }
