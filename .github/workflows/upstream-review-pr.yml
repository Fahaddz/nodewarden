name: Upstream Review PR

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:
    inputs:
      upstream_branch:
        description: Upstream branch to sync from
        required: true
        default: main

permissions:
  contents: read

concurrency:
  group: upstream-review-pr
  cancel-in-progress: true

jobs:
  sync-and-open-pr:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: main
          persist-credentials: false

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Ensure bot token exists
        env:
          PUSH_TOKEN: ${{ secrets.PR_BOT_TOKEN }}
        run: |
          test -n "$PUSH_TOKEN" || { echo "Missing secret: PR_BOT_TOKEN"; exit 1; }

      - name: Fetch upstream
        env:
          UPSTREAM_BRANCH: ${{ github.event.inputs.upstream_branch || 'main' }}
        run: |
          git remote add upstream https://github.com/shuaiplus/NodeWarden.git || true
          git fetch upstream "$UPSTREAM_BRANCH"

      - name: Merge upstream into review branch
        env:
          UPSTREAM_BRANCH: ${{ github.event.inputs.upstream_branch || 'main' }}
        run: |
          git checkout -B upstream-review origin/main
          git merge --no-ff --no-edit "upstream/$UPSTREAM_BRANCH"

      - name: Push review branch
        env:
          PUSH_TOKEN: ${{ secrets.PR_BOT_TOKEN }}
        run: |
          git remote set-url origin "https://x-access-token:${PUSH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push --force-with-lease origin upstream-review

      - name: Check whether review branch differs from main
        id: diffcheck
        run: |
          COMMITS_AHEAD="$(git rev-list --right-only --count origin/main...upstream-review)"
          if [ "$COMMITS_AHEAD" -gt 0 ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create or update PR
        if: steps.diffcheck.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.PR_BOT_TOKEN }}
          REPO: ${{ github.repository }}
          OWNER: ${{ github.repository_owner }}
        run: |
          BODY_FILE="$(mktemp)"
          cat <<'EOF' > "$BODY_FILE"
          Scheduled upstream sync for review.

          Checklist before merge:
          - Review `.github/workflows/` changes carefully
          - Review auth, backup, crypto, and deployment changes
          - Wait for CI/security checks to complete
          - Ask Codex to review `upstream-review` against `main`
          - @codex
          EOF

          EXISTING="$(gh api "repos/$REPO/pulls?state=open&head=$OWNER:upstream-review&base=main" --jq '.[0].number')"
          if [ -n "$EXISTING" ]; then
            jq -n \
              --arg title "Review upstream NodeWarden updates" \
              --arg body "$(cat "$BODY_FILE")" \
              '{title: $title, body: $body}' > pr-update.json
            gh api "repos/$REPO/pulls/$EXISTING" --method PATCH --input pr-update.json > /dev/null
            exit 0
          fi

          for attempt in 1 2 3 4 5; do
            jq -n \
              --arg title "Review upstream NodeWarden updates" \
              --arg head "$OWNER:upstream-review" \
              --arg base "main" \
              --arg body "$(cat "$BODY_FILE")" \
              '{title: $title, head: $head, base: $base, body: $body, maintainer_can_modify: true}' > pr-create.json

            if gh api "repos/$REPO/pulls" --method POST --input pr-create.json > /dev/null 2>&1; then
              exit 0
            fi

            echo "PR creation attempt $attempt failed, retrying..."
            sleep 5
          done

          echo "Failed to create PR after retries."
          exit 1

      - name: No pending upstream changes
        if: steps.diffcheck.outputs.has_changes != 'true'
        run: |
          echo "No commits between main and upstream-review. Skipping PR creation."
